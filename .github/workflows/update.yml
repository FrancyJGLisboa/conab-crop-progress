name: Update CONAB Crop Progress Data

on:
  schedule:
    # Run every Monday and Thursday at 14:00 UTC
    # CONAB typically publishes weekly reports early in the week
    - cron: '0 14 * * 1,4'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/metadata
          key: conab-raw-${{ github.run_id }}
          restore-keys: |
            conab-raw-

      - name: Run pipeline (backfill)
        run: conab-crop-progress -v backfill
        env:
          # Avoid interactive prompts
          PYTHONUNBUFFERED: '1'

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/conab_crop_progress.csv data/output/conab_crop_progress.parquet
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
          else
            ROWS=$(head -1 data/output/conab_crop_progress.csv | tr ',' '\n' | wc -l)
            TOTAL=$(wc -l < data/output/conab_crop_progress.csv | tr -d ' ')
            LATEST=$(tail -1 data/output/conab_crop_progress.csv | cut -d',' -f1)
            git commit -m "data: update crop progress — ${TOTAL} rows, latest ${LATEST}"
            git push
          fi
